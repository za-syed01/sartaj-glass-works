<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" fill="none">
  <defs>
    <linearGradient id="iconGradW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="shineGradW" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="hexBgW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <clipPath id="hexClipW">
      <polygon points="36,4 64,20 64,52 36,68 8,52 8,20"/>
    </clipPath>
  </defs>

  <!-- Hexagon badge background (translucent white on dark bg) -->
  <polygon points="36,4 64,20 64,52 36,68 8,52 8,20" fill="url(#hexBgW)"/>
  <!-- Hexagon stroke -->
  <polygon points="36,4 64,20 64,52 36,68 8,52 8,20" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>

  <!-- Glass diamond pane -->
  <polygon points="36,14 56,36 36,58 16,36" fill="url(#iconGradW)" clip-path="url(#hexClipW)"/>

  <!-- Glass shine upper-left -->
  <polygon points="36,14 56,36 36,36" fill="url(#shineGradW)" clip-path="url(#hexClipW)"/>

  <!-- Inner facet outline -->
  <polygon points="36,22 50,36 36,50 22,36" fill="none" stroke="white" stroke-width="1" opacity="0.3" clip-path="url(#hexClipW)"/>

  <!-- ── WORDMARK (white version) ── -->
  <text
    x="82"
    y="38"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="3"
    fill="#ffffff"
    dominant-baseline="middle">SARTAJ</text>

  <text
    x="84"
    y="58"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="11.5"
    font-weight="500"
    letter-spacing="5.5"
    fill="#93c5fd"
    dominant-baseline="middle">GLASS WORKS</text>

  <rect x="82" y="66" width="265" height="1.5" rx="1" fill="#60a5fa" opacity="0.4"/>
</svg>
