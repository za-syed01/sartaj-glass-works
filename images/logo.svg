<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 72" fill="none">
  <defs>
    <!-- Main blue gradient for icon -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <!-- Shine gradient for glass effect -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Dark version gradient -->
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a6e"/>
      <stop offset="100%" stop-color="#0d1a3a"/>
    </linearGradient>
    <clipPath id="hexClip">
      <polygon points="36,4 64,20 64,52 36,68 8,52 8,20"/>
    </clipPath>
  </defs>

  <!-- ── ICON MARK ── -->
  <!-- Hexagon badge background (navy) -->
  <polygon points="36,4 64,20 64,52 36,68 8,52 8,20" fill="url(#darkGrad)"/>
  <!-- Hexagon stroke -->
  <polygon points="36,4 64,20 64,52 36,68 8,52 8,20" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>

  <!-- Glass diamond pane inside hexagon -->
  <polygon points="36,14 56,36 36,58 16,36" fill="url(#iconGrad)" clip-path="url(#hexClip)"/>

  <!-- Glass shine — upper-left triangle -->
  <polygon points="36,14 56,36 36,36" fill="url(#shineGrad)" clip-path="url(#hexClip)"/>

  <!-- Inner diamond outline (depth/facet effect) -->
  <polygon points="36,22 50,36 36,50 22,36" fill="none" stroke="white" stroke-width="1" opacity="0.25" clip-path="url(#hexClip)"/>

  <!-- Thin reflection line across diamond -->
  <line x1="22" y1="36" x2="56" y2="36" stroke="white" stroke-width="0.75" opacity="0.2" clip-path="url(#hexClip)"/>

  <!-- ── WORDMARK ── -->
  <!-- "SARTAJ" — bold, wide tracking -->
  <text
    x="82"
    y="38"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="3"
    fill="#0d1a3a"
    dominant-baseline="middle">SARTAJ</text>

  <!-- "GLASS WORKS" — lighter, wide tracking -->
  <text
    x="84"
    y="58"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="11.5"
    font-weight="500"
    letter-spacing="5.5"
    fill="#3b82f6"
    dominant-baseline="middle">GLASS WORKS</text>

  <!-- Thin accent rule under wordmark -->
  <rect x="82" y="66" width="265" height="1.5" rx="1" fill="#3b82f6" opacity="0.3"/>
</svg>
